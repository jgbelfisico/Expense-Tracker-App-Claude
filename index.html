<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">

      <header>
        <h1>Expense Tracker</h1>
        <p class="subtitle">Registra tus ingresos y gastos personales</p>
      </header>

      <main>

        <!-- Tarjetas de resumen -->
        <section class="summary" id="summary">
          <div class="card card--balance">
            <span class="card__label">Balance total</span>
            <span class="card__amount" id="total-balance">$0.00</span>
          </div>
          <div class="card card--income">
            <span class="card__label">Ingresos</span>
            <span class="card__amount" id="total-income">$0.00</span>
          </div>
          <div class="card card--expense">
            <span class="card__label">Gastos</span>
            <span class="card__amount" id="total-expenses">$0.00</span>
          </div>
        </section>

        <!-- Gráfica de ingresos vs gastos -->
        <section class="chart-section">
          <h2>Ingresos vs Gastos</h2>
          <canvas id="chart"></canvas>
        </section>

        <!-- Formulario para agregar movimiento -->
        <section class="form-section">
          <h2>Agregar movimiento</h2>

          <form id="movement-form">

            <!-- Tipo -->
            <div class="form-group">
              <label class="form-label">Tipo</label>
              <div class="radio-group">
                <label class="radio-option">
                  <input type="radio" name="type" value="income" checked />
                  <span class="radio-option__label radio-option__label--income">Ingreso</span>
                </label>
                <label class="radio-option">
                  <input type="radio" name="type" value="expense" />
                  <span class="radio-option__label radio-option__label--expense">Gasto</span>
                </label>
              </div>
            </div>

            <!-- Categoría y monto en la misma fila -->
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="category">Categoría</label>
                <!-- Las opciones se generan en JS según el tipo seleccionado -->
                <select id="category" name="category"></select>
              </div>

              <div class="form-group">
                <label class="form-label" for="amount">Monto</label>
                <input
                  type="number"
                  id="amount"
                  name="amount"
                  placeholder="0.00"
                  min="0.01"
                  step="0.01"
                />
              </div>
            </div>

            <!-- Fecha -->
            <div class="form-group">
              <label class="form-label" for="date">Fecha</label>
              <input type="date" id="date" name="date" />
            </div>

            <!-- Descripción -->
            <div class="form-group">
              <label class="form-label" for="description">
                Descripción <span class="optional">(opcional)</span>
              </label>
              <input
                type="text"
                id="description"
                name="description"
                placeholder="Ej: compra en supermercado"
                maxlength="100"
              />
            </div>

            <!-- Error de validación -->
            <p class="form-error hidden" id="form-error"></p>

            <div class="form-actions">
              <button type="button" id="cancel-btn" class="btn btn--cancel hidden">Cancelar</button>
              <button type="submit"  id="submit-btn" class="btn btn--primary">Agregar movimiento</button>
            </div>

          </form>
        </section>

        <!-- Lista de movimientos -->
        <section class="movements-section">
          <div class="movements-header">
            <h2>Movimientos</h2>
            <div class="filters" id="filters">
              <button class="btn btn--filter active" data-filter="all">Todos</button>
              <button class="btn btn--filter" data-filter="income">Ingresos</button>
              <button class="btn btn--filter" data-filter="expense">Gastos</button>
            </div>
          </div>

          <!-- Estado vacío -->
          <p class="empty-state" id="empty-state">
            No hay movimientos registrados todavía.
          </p>

          <!-- Lista — el JS la llena en cada render -->
          <ul class="movements-list" id="movements-list"></ul>
        </section>

      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
